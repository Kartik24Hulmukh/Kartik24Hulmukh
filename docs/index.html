<!doctype html>
<html lang="en">
<head>

<body>
  <header>

  <main>
    <nav aria-label="Filter records">
      <button type="button" class="active" data-filter="all">All records</button>
      <button type="button" data-filter="product">Product</button>
      <button type="button" data-filter="system">Systems</button>
      <button type="button" data-filter="boundary">Boundaries</button>

      <noscript>
        <article class="record">
          <div class="number">01</div>

            <p>Campus-specific; adoption figures published only when measured.</p>
          </div>
        </article>

          <div class="number">02</div>

          </div>
          <div class="evidence">
            <strong>Evidence</strong>
            <p>Published benchmark, test commands, separately runnable verifier.</p>
            <strong>Boundary</strong>
            <p>Repository evidence; third-party validation pending.</p>
          </div>
        </article>
        <article class="record">
          <div class="number">03</div>
          <div>
            <p class="role">Engineering Contributor · Public beta</p>
            <h2>Project X-Ray India</h2>
            <p>Source-linked public-infrastructure claims organized for human investigation.</p>
            <a href="https://github.com/Kartik24Hulmukh/project-xray-india">Inspect public record →</a>
          </div>
          <div class="evidence">
            <strong>Evidence</strong>
            <p>Repository, evidence policy, review gates.</p>
            <strong>Boundary</strong>
            <p>Supports investigation; does not determine corruption.</p>
          </div>
        </article>
        <article class="record">
          <div class="number">04</div>
          <div>
            <p class="role">Builder · Contributor · Experimental</p>

            <strong>Evidence</strong>
            <p>Repository examples and replay paths.</p>
            <strong>Boundary</strong>
            <p>Bounded executable evidence, not formal proof.</p>
          </div>
        </article>
      </noscript>
    </section>
  </main>
  <footer>
    <p>No source → no answer. No oracle → no claim. No negative test → no confidence.</p>
