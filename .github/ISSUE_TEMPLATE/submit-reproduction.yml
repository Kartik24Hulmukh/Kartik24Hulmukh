name: Submit a reproduction
description: Share an independent attempt to reproduce a published result.
title: "[reproduction] "
labels: ["evidence/reproduction", "needs-review"]
body:
  - type: input
    id: project
    attributes:
      label: Project and claim
    validations:
      required: true
  - type: input
    id: sha
    attributes:
      label: Exact commit SHA
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment and commands
    validations:
      required: true
  - type: textarea
    id: result
    attributes:
      label: Observed result and public logs
    validations:
      required: true
  - type: checkboxes
    id: independence
    attributes:
      label: Reproduction context
      options:
        - label: I disclose whether I am affiliated with the project.
          required: true
        - label: I confirm this submission contains no secrets or private data.
          required: true
