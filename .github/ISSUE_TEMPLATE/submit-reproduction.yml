name: Submit a reproduction
description: Share an independent attempt to reproduce a published claim.
title: "[reproduction] "
labels: ["evidence/reproduction", "needs-review"]
body:
  - type: input
    id: claim
    attributes: {label: Claim ID}
    validations: {required: true}
  - type: input
    id: sha
    attributes: {label: Exact commit SHA}
    validations: {required: true}
  - type: textarea
    id: env
    attributes: {label: Environment and commands}
    validations: {required: true}
  - type: textarea
    id: result
    attributes: {label: Observed result and logs}
    validations: {required: true}
  - type: checkboxes
    id: safety
    attributes:
      label: Safety
      options:
        - label: I confirm this submission contains no secrets or private data.
          required: true
