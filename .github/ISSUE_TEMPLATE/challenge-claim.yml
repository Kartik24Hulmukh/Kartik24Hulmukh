name: Challenge a public claim
description: Report an incorrect, stale, too-broad, or insufficiently bounded statement.
title: "[claim challenge] "
labels: ["evidence/challenge", "needs-triage"]
body:
  - type: input
    id: claim
    attributes:
      label: Claim or project
      description: Quote the exact statement or name the project.
    validations:
      required: true
  - type: input
    id: revision
    attributes:
      label: Repository and revision
      placeholder: owner/repository@commit
  - type: textarea
    id: concern
    attributes:
      label: What appears incorrect, stale, or too broad?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps and observed result
  - type: textarea
    id: evidence
    attributes:
      label: Public evidence links
  - type: checkboxes
    id: safety
    attributes:
      label: Safety
      options:
        - label: I confirm this submission contains no credentials, private data, or personal student information.
          required: true
