name: Challenge a claim
description: Report a claim that is incorrect, too broad, stale, or missing a boundary.
title: "[claim challenge] "
labels:
  - evidence/challenge
  - needs-triage
body:
  - type: input
    id: claim
    attributes:
      label: Claim or claim ID
      description: Quote the exact statement.
      placeholder: kairo-airgap-001
    validations:
      required: true
  - type: input
    id: revision
    attributes:
      label: Repository and revision
      placeholder: owner/repo@commit
  - type: textarea
    id: concern
    attributes:
      label: "What appears incorrect or too broad?"
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction command and observed result
  - type: textarea
    id: evidence
    attributes:
      label: Public evidence links
  - type: checkboxes
    id: safety
    attributes:
      label: Safety
      options:
        - label: I confirm this report contains no secrets or private data.
          required: true
