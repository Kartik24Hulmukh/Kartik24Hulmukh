name: Refresh public project status

on:
  workflow_dispatch:
  schedule:
    - cron: '17 5 * * 1'

permissions:
  contents: write

concurrency:
  group: profile-refresh
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out profile repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Render repository status and profile graphic
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 scripts/render_profile.py
          python3 scripts/render_status_svg.py

      - name: Validate generated files
        run: |
          python3 scripts/validate_profile.py
          git diff --check

      - name: Commit only when public evidence changed
        run: |
          if git diff --quiet -- README.md assets/mission-control.svg; then
            exit 0
          fi
          git config user.name 'profile-status-bot'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add README.md assets/mission-control.svg
          git commit -m 'docs: refresh public project status'
          git push
