name: Verify profile
on:
  pull_request:
  push:
    branches: [main]
permissions:
  contents: read
concurrency:
  group: profile-verify-${{ github.ref }}
  cancel-in-progress: true
jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Setup Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.12"
      - name: Render editorial assets
        run: python scripts/render_editorial.py
      - name: Validate noticeboard
        run: python scripts/validate.py
      - name: Ensure render is deterministic
        run: git diff --exit-code
