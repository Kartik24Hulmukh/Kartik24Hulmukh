name: Verify profile
on:
  pull_request:
  push:
    branches: [main]
permissions:
  contents: read
jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      - run: python scripts/render_now.py
      - run: python scripts/render_assets.py
      - run: python scripts/validate.py
      - run: python -m py_compile scripts/collect.py
      - run: python -m py_compile scripts/render_assets.py
      - run: python -m py_compile scripts/render_now.py
      - run: python -m py_compile scripts/validate.py
      - run: git diff --exit-code
