<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="560" viewBox="0 0 1280 560" role="img" aria-labelledby="t d"><title id="t">Kartik Hulmukh — Software that shows its work</title><desc id="d">Three connected mechanisms represent confirmation, source review, and behavioral testing.</desc><rect width="1280" height="560" fill="#1548ff"/><style>.big{font:900 88px Arial,sans-serif;letter-spacing:-5px}.small{font:700 12px Arial,sans-serif;letter-spacing:2px}.label{font:800 16px Arial,sans-serif}</style><text x="58" y="58" class="small" fill="#c9ff35">KARTIK HULMUKH / SYSTEMS IN MOTION / 2026</text><text x="58" y="160" class="big" fill="#f4f0e8">SOFTWARE THAT</text><text x="58" y="248" class="big" fill="#c9ff35">SHOWS ITS WORK.</text><g transform="translate(60 325)"><rect width="330" height="150" rx="75" fill="none" stroke="#c9ff35" stroke-width="3"/><circle cx="75" cy="75" r="42" fill="#c9ff35"/><text x="140" y="68" class="small" fill="#f4f0e8">01 / KAIRO-PHANTOM</text><text x="140" y="94" class="label" fill="#f4f0e8">ACTION → RECEIPT</text></g><g transform="translate(470 325)"><path d="M0 75h70l45-55 60 110 55-70h100" fill="none" stroke="#ff6f3d" stroke-width="7"/><text x="0" y="22" class="small" fill="#f4f0e8">02 / PROJECT X-RAY</text><text x="0" y="146" class="label" fill="#f4f0e8">SOURCE → REVIEW</text></g><g transform="translate(880 325)"><rect width="140" height="105" fill="#f3c6ff"/><rect x="170" width="140" height="105" fill="none" stroke="#f3c6ff" stroke-width="3"/><path d="M140 52h30" stroke="#c9ff35" stroke-width="5"/><text x="0" y="146" class="label" fill="#f4f0e8">03 / BASE ↔ HEAD</text></g><text x="1000" y="60" class="small" fill="#f4f0e8">LOCAL-FIRST</text><text x="1000" y="84" class="small" fill="#f4f0e8">HUMAN-GATED</text><text x="1000" y="108" class="small" fill="#f4f0e8">INSPECTABLE</text><text x="58" y="525" class="small" fill="#f4f0e8">OPERATE THE PROJECT MECHANISMS → kartik24hulmukh.github.io/Kartik24Hulmukh/</text></svg>