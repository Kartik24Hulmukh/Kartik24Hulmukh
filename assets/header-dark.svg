<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="320" viewBox="0 0 1280 320" font-family="'SF Mono','Liberation Mono','Courier New',monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0a0a"/>
      <stop offset="1" stop-color="#111111"/>
    </linearGradient>
    <pattern id="dots" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="0.5" fill="#ffffff" fill-opacity="0.04"/>
    </pattern>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22c55e"/>
      <stop offset="1" stop-color="#4ade80"/>
    </linearGradient>
  </defs>

  <!-- bg -->
  <rect width="1280" height="320" rx="12" fill="url(#bg)"/>
  <rect width="1280" height="320" rx="12" fill="url(#dots)"/>

  <!-- top bar -->
  <rect y="0" width="1280" height="36" rx="12" fill="#151515"/>
  <rect x="0" y="12" width="1280" height="24" fill="#151515"/>
  <line x1="0" y1="36" x2="1280" y2="36" stroke="#ffffff" stroke-opacity="0.06"/>
  <circle cx="24" cy="18" r="5" fill="#ff5f57"/>
  <circle cx="42" cy="18" r="5" fill="#febc2e"/>
  <circle cx="60" cy="18" r="5" fill="#28c840"/>
  <text x="640" y="22" text-anchor="middle" font-size="11" fill="#ffffff" fill-opacity="0.25" letter-spacing="2">kartik@systems ~/proof</text>

  <!-- main statement -->
  <text x="56" y="108" font-family="Arial,Helvetica,sans-serif" font-size="14" fill="#22c55e" letter-spacing="4" font-weight="500">KARTIK HULMUKH</text>
  
  <text x="56" y="168" font-family="Arial,Helvetica,sans-serif" font-size="44" font-weight="700" fill="#ffffff" fill-opacity="0.9">I build things that leave</text>
  <text x="56" y="222" font-family="Arial,Helvetica,sans-serif" font-size="44" font-weight="700" fill="url(#accent)">evidence.</text>

  <!-- prompt line -->
  <text x="56" y="282" font-size="13" fill="#ffffff" fill-opacity="0.18">$</text>
  <text x="72" y="282" font-size="13" fill="#ffffff" fill-opacity="0.4">agents · os · security · sensor-fusion</text>
  
  <!-- blinking cursor -->
  <rect x="365" y="269" width="8" height="16" fill="#22c55e" fill-opacity="0.7">
    <animate attributeName="fill-opacity" values="0.7;0;0.7" dur="1.2s" repeatCount="indefinite"/>
  </rect>
</svg>
